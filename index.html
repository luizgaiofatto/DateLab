<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#970747">

    <link rel="stylesheet" href="style.css">

    <link rel="manifest" href="manifest.json">
    
    <!--google fonts-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech&display=swap" rel="stylesheet">

    <link rel="icon" href="assets/icon.svg" type="image/svg+xml">

    <title>DateLab</title>
</head>
<body>
    <header>
        <img src="assets/icon.svg" alt="Logo" class="logo">
        <h1>DateLab</h1>
    </header>

    <main>
        <section class="container-card">
            <div class="card">
                <img src="assets/images/white-empty.jpg" class="card-img" id="card-img" alt="">
                <div class="card-body">
                    <h3 class="card-title" id="card-title"></h3>
                    <p class="card-text" id="card-text">Clique em "Sortear" para gerar um date</p>
                </div>
            </div>
        </section>

        <div class="container-button"> 
            <button class="btn" id="btn-randomize">Sortear</button>
            <button class="btn" id="btn-submit">Enviar</button>
        </div>

        <div class="container-input">
            <input type="tel" id="input-numero" placeholder="Digite o número com DDD (ex: 5511999999999)">
        </div>

    </main>

    <script src="script.js"></script>
    <script src="sw.js"></script>

</body>
</html>
